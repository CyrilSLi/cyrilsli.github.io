<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTLive Run Redirect</title>
    <script src="https://cdn.jsdelivr.net/npm/epoxy-tls-polyfill@1/dist/javascript.min.js"></script>
    <script>
        (async () => {
            const run = new URLSearchParams(window.location.search).get("run");
            const schedules = new DOMParser().parseFromString(await fetch("https://www.wtlivewpg.com/Pages/Timetables").then(res => res.text()), "text/html");
            const timetableDate = schedules.querySelector('a[href^="20"]').href.match(/\d{4}-\d{2}-\d{2}/)[0];
            const scheduleType = {
                "1": "Weekday",
                "2": "Saturday",
                "3": "Sunday"
            }[run.charAt(0)];
            const link = document.createElement("a");
            link.href = `https://www.wtlivewpg.com/Pages/Timetables/${timetableDate}/Runs/${scheduleType}/${run.slice(2)}/Run.html`;
            document.body.appendChild(link);
            link.click();
        })();
    </script>
</head>
<body>
</body>
</html>
